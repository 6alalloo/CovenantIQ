services:
  covenantiq-app:
    build: .
    container_name: covenantiq-app
    environment:
      SPRING_PROFILES_ACTIVE: demo
      APP_REQUEST_DEBUG_ENABLED: "true"
      APP_CORS_ALLOW_ALL_ORIGINS: "false"
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: "http://covenantiq.local:8081"
    expose:
      - "38080"

  covenantiq-proxy:
    image: nginx:1.27-alpine
    container_name: covenantiq-proxy
    depends_on:
      - covenantiq-app
    ports:
      - "8081:8081"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
